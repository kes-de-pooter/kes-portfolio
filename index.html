  let currentSpread = 0;

  function setupPageButtons() {
    document.querySelectorAll("[data-page]").forEach((button) => {
      button.onclick = () => {
        const pageIndex = Number(button.dataset.page);
        currentSpread = Math.floor(pageIndex / 2);
        renderSpread();
      };
    });
  }

  function setupImageClicks() {
    document.querySelectorAll(".clickableImage").forEach((img) => {
      img.onclick = (event) => {
        event.stopPropagation();
        modalImage.src = img.src;
        modalImage.alt = img.alt;
        imageModal.style.display = "flex";
      };
    });
  }

  function renderSpread() {
    const leftPageIndex = currentSpread * 2;
    const rightPageIndex = leftPageIndex + 1;

    const leftPage = pages[leftPageIndex];
    const rightPage = pages[rightPageIndex];

    if (leftPage) {
      leftLabel.textContent = leftPage.label;
      leftTitle.textContent = leftPage.title;
      leftText.innerHTML = leftPage.content;
      leftNumber.textContent = leftPageIndex + 1;
    } else {
      leftLabel.textContent = "";
      leftTitle.textContent = "";
      leftText.innerHTML = "";
      leftNumber.textContent = "";
    }

    if (rightPage) {
      rightLabel.textContent = rightPage.label;
      rightTitle.textContent = rightPage.title;
      rightText.innerHTML = rightPage.content;
      rightNumber.textContent = rightPageIndex + 1;
    } else {
      rightLabel.textContent = "";
      rightTitle.textContent = "";
      rightText.innerHTML = "";
      rightNumber.textContent = "";
    }

    prevSpread.disabled = currentSpread === 0;
    nextSpread.disabled = rightPageIndex >= pages.length - 1;

    setupPageButtons();
    setupImageClicks();
  }

  function showOverlay() {
    if (overlayVisible) return;
    overlayVisible = true;
    bookOverlay.style.display = "block";
    renderSpread();
  }

  closeModal.addEventListener("click", (event) => {
    event.stopPropagation();
    imageModal.style.display = "none";
    modalImage.src = "";
  });

  imageModal.addEventListener("click", (event) => {
    if (event.target === imageModal) {
      imageModal.style.display = "none";
      modalImage.src = "";
    }
  });

  infoButton.onclick = () => {
  infoModal.style.display = "flex";
};

closeInfo.onclick = () => {
  infoModal.style.display = "none";
};

infoModal.onclick = (e) => {
  if (e.target === infoModal) {
    infoModal.style.display = "none";
  }
};

  loader.load(
    "./animated.book.final2.glb",
    function (gltf) {
      model = gltf.scene;
      scene.add(model);

      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());

      model.position.sub(center);

      const maxDim = Math.max(size.x, size.y, size.z);
      const distance = maxDim * 2.4;

      camera.position.set(
        distance * 0.0,
        distance * 0.82,
        -distance * 0.05
      );

      lookTarget.set(0, 0, 0);
      camera.lookAt(lookTarget);

      startCameraPosition.copy(camera.position);
      startLookTarget.copy(lookTarget);

      const shiftX = -maxDim * -0.35;

      targetCameraPosition.copy(startCameraPosition);
      targetCameraPosition.x += shiftX;

      targetLookTarget.copy(startLookTarget);
      targetLookTarget.x += shiftX;

      camera.near = Math.max(0.01, maxDim / 100);
      camera.far = maxDim * 20;
      camera.updateProjectionMatrix();

      animations = gltf.animations || [];
      console.log("Animaties gevonden:", animations);

      maxAnimationDuration = 0;

      if (animations.length > 0) {
        mixer = new THREE.AnimationMixer(model);

        animations.forEach((clip, index) => {
          console.log(index, clip.name, clip.duration);
          maxAnimationDuration = Math.max(maxAnimationDuration, clip.duration);
        });
      } else {
        hint.textContent = "Geen animaties gevonden";
      }
    },
    function (xhr) {
      if (xhr.total) {
        console.log(((xhr.loaded / xhr.total) * 100).toFixed(1) + "% geladen");
      }
    },
    function (error) {
      console.error("Laad fout:", error);
    }
  );

  function playAllAnimationsOnce() {
    if (!mixer || animations.length === 0 || hasStarted) return;

    hasStarted = true;
    shouldMoveView = true;
    animationStartTime = performance.now();

    animations.forEach((clip) => {
      const action = mixer.clipAction(clip);
      action.reset();
      action.setLoop(THREE.LoopOnce, 1);
      action.clampWhenFinished = true;
      action.play();
    });

    hint.style.display = "none";
  }

  window.addEventListener("click", (event) => {
    if (event.target.closest(".page")) return;
    if (event.target.closest(".navControls")) return;
    if (event.target.closest("#imageModal")) return;
    playAllAnimationsOnce();
  });

  prevSpread.addEventListener("click", () => {
    if (currentSpread > 0) {
      currentSpread--;
      renderSpread();
    }
  });

  nextSpread.addEventListener("click", () => {
    const maxSpread = Math.ceil(pages.length / 2) - 1;
    if (currentSpread < maxSpread) {
      currentSpread++;
      renderSpread();
    }
  });

  function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();

    if (mixer) {
      mixer.update(delta);
    }

    if (shouldMoveView) {
      camera.position.lerp(targetCameraPosition, 0.015);
      lookTarget.lerp(targetLookTarget, 0.015);

      if (
        camera.position.distanceTo(targetCameraPosition) < 0.01 &&
        lookTarget.distanceTo(targetLookTarget) < 0.01
      ) {
        camera.position.copy(targetCameraPosition);
        lookTarget.copy(targetLookTarget);
        shouldMoveView = false;
      }
    }

    const overlayDelayMs = (maxAnimationDuration * 1000 * 0.88) + 150;

    if (
      hasStarted &&
      !overlayVisible &&
      !shouldMoveView &&
      performance.now() - animationStartTime >= overlayDelayMs
    ) {
      showOverlay();
    }

    camera.lookAt(lookTarget);
    renderer.render(scene, camera);
  }

  animate();

  window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
